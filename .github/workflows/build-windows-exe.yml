name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the asset to (e.g. v6.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Launcher
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-windows.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller pyinstaller.spec --noconfirm

      - name: Create zip archive
        run: Compress-Archive -Path dist\xianyu-openclaw-launcher\* -DestinationPath dist\xianyu-openclaw-launcher.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-openclaw-launcher
          path: dist/xianyu-openclaw-launcher.zip
          retention-days: 30

      - name: Determine release tag
        id: tag
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            echo "tag=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event.inputs.tag }}" -ne "") {
            echo "tag=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Upload to release
        if: steps.tag.outputs.tag != ''
        run: gh release upload ${{ steps.tag.outputs.tag }} dist/xianyu-openclaw-launcher.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
